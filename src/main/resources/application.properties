# LLM Configuration
app.llm.base-url=http://localhost:11434/
app.llm.api-key=local
app.llm.model=qwen3.5:4b
app.llm.maxTokens=32768

# workspace
app.file.workspace=

# Filing RAG QA subsystem (disabled by default; enable with app.filing-rag.enabled=true)
app.filing-rag.enabled=false
app.filing-rag.backend=milvus

# rag-chunk
app.filing-rag.chunk.target-tokens=400
app.filing-rag.chunk.max-tokens=600
app.filing-rag.chunk.overlap-tokens=80
# rag-search
app.filing-rag.search.top-k=5
app.filing-rag.search.similarity-threshold=0.30
app.filing-rag.search.vector-multiplier=3
# rag-embed
app.filing-rag.ollama.embed-url=http://localhost:11434/api/embed
app.filing-rag.ollama.embed-model=qwen3-embedding:4b
app.filing-rag.ollama.dimension=2560
# rag-llm
app.filing-rag.llm.base-url=http://localhost:11434/v1
app.filing-rag.llm.model=qwen3.5:4b
app.filing-rag.llm.temperature=0.2
app.filing-rag.llm.max-tokens=2048
# rag-milvus
app.filing-rag.milvus.endpoint=http://127.0.0.1:19530
app.filing-rag.milvus.token=
app.filing-rag.milvus.collection=invest_filing
app.filing-rag.milvus.insert-batch-size=100
# rag-ragflow
app.filing-rag.ragflow.base-url=http://localhost:9380
app.filing-rag.ragflow.api-key=${RAGFLOW_API_KEY:}
app.filing-rag.ragflow.dataset-prefix=filing_rag_
app.filing-rag.ragflow.similarity-threshold=0.3
app.filing-rag.ragflow.keyword-weight=0.3
app.filing-rag.ragflow.parse-poll-timeout-seconds=300
app.filing-rag.ragflow.parse-poll-interval-seconds=3
app.filing-rag.ragflow.request-timeout-seconds=60
