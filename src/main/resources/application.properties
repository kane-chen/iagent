# LLM Configuration
app.llm.base-url=http://localhost:11434/
app.llm.api-key=local
app.llm.model=qwen3:4b
app.llm.maxTokens=32768

# workspace
app.file.workspace=

app.kb.enabled=false
app.kb.backend=milvus

app.kb.retrieval.vector-top-k=50
app.kb.retrieval.result-top-k=5
app.kb.retrieval.summary-candidate-multiplier=4
app.kb.retrieval.enable-exact-capping=true
app.kb.retrieval.expansion-ratio=0.3

app.kb.milvus.endpoint=http://127.0.0.1:19530
app.kb.milvus.token=
app.kb.milvus.collection=invest_filing_test
app.kb.milvus.dimension=2560

app.kb.embedding.base-url=http://localhost:11434/api/embed
app.kb.embedding.api-key=local
app.kb.embedding.model=qwen3-embedding:4b
app.kb.embedding.dimension=2560

app.kb.ragflow.base-url=http://localhost
app.kb.ragflow.api-key=ragflow-JFWPpluXcQX3uih2NII7CDxu3ieyadP4fFvRLMVVYm4
app.kb.ragflow.dataset-prefix=filing_kb_
app.kb.ragflow.parser-method=naive
app.kb.ragflow.chunk-token-num=512
app.kb.ragflow.similarity-threshold=0.2
app.kb.ragflow.keyword-similarity-weight=0.3
app.kb.ragflow.embedding-model=
app.kb.ragflow.request-timeout-seconds=60
app.kb.ragflow.parse-poll-timeout-seconds=300
app.kb.ragflow.parse-poll-interval-seconds=3
