# LLM Configuration
app.llm.base-url=http://localhost:11434/
app.llm.api-key=local
app.llm.model=qwen3:4b
app.llm.maxTokens=32768

# Milvus Vector Database Configuration
app.milvus.endpoint=http://127.0.0.1:19530
app.milvus.token=
app.milvus.collection=invest_filing_test
app.milvus.dimension=2560

# Embedding Model Configuration
app.embedding.base-url=http://localhost:11434/api/embed
app.embedding.api-key=local
app.embedding.model=qwen3-embedding:4b
app.embedding.dimension=2560

# Knowledge Base Search Configuration
app.kb.backend=milvus
app.kb.vector-top-k=50
app.kb.result-top-k=5
app.kb.summary-candidate-multiplier=4
app.kb.enable-exact-capping=true
app.kb.expansion-ratio=0.3

# RAGFlow (only used when app.kb.backend=ragflow)
app.ragflow.base-url=http://localhost
app.ragflow.api-key=ragflow-JFWPpluXcQX3uih2NII7CDxu3ieyadP4fFvRLMVVYm4
app.ragflow.dataset-prefix=filing_kb_
app.ragflow.parser-method=naive
app.ragflow.chunk-token-num=512
app.ragflow.similarity-threshold=0.2
app.ragflow.keyword-similarity-weight=0.3
app.ragflow.embedding-model=
app.ragflow.request-timeout-seconds=60
app.ragflow.parse-poll-timeout-seconds=300
app.ragflow.parse-poll-interval-seconds=3

# sec-user-agent
app.filing.sec-user-agent=io/yiying5@gmail.com

# workspace
app.file.workspace=
